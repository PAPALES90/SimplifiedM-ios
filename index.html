<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sohbet (iOS 9)</title>
</head>
<body>
    <div id="login-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#add8e6; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:10px;">
            <input id="name-input" placeholder="Adın ne?">
            <button onclick="kayitOl()">Giriş</button>
        </div>
    </div>

    <div id="chat-ui" style="display:none;">
        <div id="chat" style="height:300px; border:1px solid #ccc; overflow:auto;"></div>
        <input id="input" placeholder="Mesaj...">
        <button onclick="send()">Gönder</button>
    </div>

    <!-- iOS 9 uyumlu socket.io kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script>
        var socket = io(); // Adresi render otomatik tanır
        var kullaniciAdi = localStorage.getItem('chatUsername');

        if (kullaniciAdi) { baslat(kullaniciAdi); }

        function kayitOl() {
            var isim = document.getElementById('name-input').value;
            if(isim) {
                localStorage.setItem('chatUsername', isim);
                baslat(isim);
            }
        }

        function baslat(isim) {
            kullaniciAdi = isim;
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'block';
            socket.emit('yeni-kullanici', isim);
        }

        function send() {
            var input = document.getElementById('input');
            if(input.value.trim() !== "") {
                socket.emit('mesaj', {kimden: kullaniciAdi, icerik: input.value});
                input.value = '';
            }
        }

        socket.on('mesaj', function(data) {
            var div = document.createElement('div');
            div.innerHTML = '<strong>' + data.kimden + ':</strong> ' + data.icerik;
            var chat = document.getElementById('chat');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
