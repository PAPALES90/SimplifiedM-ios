<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimplifiedM Chat</title>
    <style>
        /* iOS 9 Safari için güvenli temel ayarlar */
        html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; background-color: #e5ddd5; }
        
        #login-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: #008069; display:flex; justify-content:center; align-items:center; z-index: 1000; }
        .login-box { background: white; padding: 20px; border-radius: 10px; text-align: center; width: 80%; }
        
        #chat-ui { width: 100%; height: 100%; background: white; display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #008069; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 14px; }
        #chat { flex: 1; padding: 10px; overflow-y: scroll; -webkit-overflow-scrolling: touch; background: #f0f2f5; }
        
        .msg { background: white; padding: 10px; margin-bottom: 10px; border-radius: 10px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .footer { padding: 10px; background: white; border-top: 1px solid #ccc; display: block; }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 20px; box-sizing: border-box; }
        button { width: 25%; padding: 10px; background: #008069; color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="login-box">
            <h3>Hoş geldin!</h3>
            <input id="name-input" placeholder="Adın ne?">
            <button onclick="kayitOl()" style="margin-top:10px;">Giriş</button>
        </div>
    </div>

    <div id="chat-ui" style="display:none;">
        <div id="header">Aktif: <span id="liste">...</span></div>
        <div id="chat"></div>
        <div class="footer">
            <input id="input" placeholder="Mesaj...">
            <button onclick="send()">Gönder</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script>
        var socket = io(); 
        var kullaniciAdi = localStorage.getItem('chatUsername');

        if (kullaniciAdi) { baslat(kullaniciAdi); }

        function kayitOl() {
            var isim = document.getElementById('name-input').value;
            if(isim) {
                localStorage.setItem('chatUsername', isim);
                baslat(isim);
            }
        }

        function baslat(isim) {
            kullaniciAdi = isim;
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            socket.emit('yeni-kullanici', isim);
        }

        function send() {
            var input = document.getElementById('input');
            if(input.value.trim() !== "") {
                socket.emit('mesaj', {kimden: kullaniciAdi, icerik: input.value});
                input.value = '';
            }
        }

        socket.on('mesaj', function(data) {
            var div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = '<strong>' + data.kimden + ':</strong> ' + data.icerik;
            var chat = document.getElementById('chat');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        socket.on('kullanici-listesi', function(list) {
            document.getElementById('liste').textContent = list.join(', ');
        });
    </script>
</body>
</html>
