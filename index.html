<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SimplifiedM Sohbet</title>
    <style>
        /* Tasarım kısmı: Soluk mavi ekran */
        #login-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #add8e6; /* Soluk mavi */
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-box { background: white; padding: 20px; border-radius: 10px; text-align: center; }
        body { font-family: sans-serif; }
    </style>
</head>
<body>

    <!-- İsim giriş ekranı -->
    <div id="login-modal">
        <div class="login-box">
            <h2>Hoş geldin!</h2>
            <input id="name-input" placeholder="Adın ne olsun?">
            <button onclick="kayitOl()">Giriş Yap</button>
        </div>
    </div>

    <!-- Sohbet ekranı -->
    <div id="chat-ui" style="display:none;">
        <div style="border:1px solid red; padding:5px; margin-bottom:10px;">
            <strong>Aktif:</strong> <span id="liste"></span>
        </div>
        <div id="chat" style="height:300px; border:1px solid #ccc; overflow:auto;"></div>
        <input id="input" placeholder="Mesaj...">
        <button onclick="send()">Gönder</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        let kullaniciAdi = localStorage.getItem('chatUsername'); // Daha önce girdi mi kontrol et

        // Eğer isim kayıtlıysa giriş ekranını atla
        if (kullaniciAdi) {
            baslat(kullaniciAdi);
        }

        function kayitOl() {
            let isim = document.getElementById('name-input').value;
            if(isim.length > 13) isim = isim.substring(0, 13);
            if(isim) {
                localStorage.setItem('chatUsername', isim); // İsmi hafızaya kaydet
                baslat(isim);
            }
        }

        function baslat(isim) {
            kullaniciAdi = isim;
            document.getElementById('login-modal').style.display = 'none'; // Giriş ekranını kapat
            document.getElementById('chat-ui').style.display = 'block';   // Sohbeti aç
            socket.emit('yeni-kullanici', isim);
        }

        // ... Diğer mesajlaşma kodları aynı ...
        socket.on('gecmis-mesajlar', (gecmis) => { gecmis.forEach(m => mesajEkle(m)); });
        socket.on('mesaj', (data) => { mesajEkle(data); });
        socket.on('kullanici-listesi', (list) => { document.getElementById('liste').textContent = list.join(', '); });

        function send() {
            const input = document.getElementById('input');
            if(input.value.trim() !== "") {
                socket.emit('mesaj', {isim: kullaniciAdi, mesaj: input.value});
                input.value = '';
            }
        }

        function mesajEkle(data) {
            const div = document.createElement('div');
            div.textContent = `(${data.kimden}): ${data.icerik}`;
            document.getElementById('chat').appendChild(div);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }
    </script>
</body>
</html>
